<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Wave decoration at bottom -->
  <path d="M16,320 Q80,290 144,320 Q208,350 272,320 Q336,290 400,320 Q464,350 496,320 L496,480 Q496,496 480,496 L32,496 Q16,496 16,480 Z" fill="url(#waveGrad)" opacity="0.4"/>
  <path d="M16,350 Q80,320 144,350 Q208,380 272,350 Q336,320 400,350 Q464,380 496,350 L496,480 Q496,496 480,496 L32,496 Q16,496 16,480 Z" fill="url(#waveGrad)" opacity="0.3"/>

  <!-- Fish body -->
  <ellipse cx="270" cy="230" rx="110" ry="55" fill="white" opacity="0.95"/>

  <!-- Fish tail -->
  <path d="M155,230 L110,180 L110,280 Z" fill="white" opacity="0.95"/>

  <!-- Fish eye -->
  <circle cx="330" cy="215" r="14" fill="#1e40af"/>
  <circle cx="334" cy="211" r="5" fill="white"/>

  <!-- Fish mouth -->
  <path d="M378,235 Q390,230 378,225" stroke="#1e40af" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Fish fin (top) -->
  <path d="M240,175 Q260,130 290,175" fill="#93c5fd" opacity="0.8"/>

  <!-- Fish fin (bottom) -->
  <path d="M250,285 Q265,310 285,285" fill="#93c5fd" opacity="0.8"/>

  <!-- Fish scales pattern -->
  <path d="M220,220 Q235,210 250,220" stroke="#bfdbfe" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M250,220 Q265,210 280,220" stroke="#bfdbfe" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M280,220 Q295,210 310,220" stroke="#bfdbfe" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M205,240 Q220,230 235,240" stroke="#bfdbfe" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M235,240 Q250,230 265,240" stroke="#bfdbfe" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M265,240 Q280,230 295,240" stroke="#bfdbfe" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Fishing hook above fish -->
  <line x1="330" y1="80" x2="330" y2="150" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="8,4"/>
  <path d="M330,150 Q330,175 315,175 Q300,175 300,160" stroke="#e5e7eb" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="300" cy="157" r="3" fill="#e5e7eb"/>

  <!-- Text: SF -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="60" fill="white" opacity="0.9">SF</text>
</svg>